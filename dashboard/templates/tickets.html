{% extends "guild_base.html" %}
{% block guild_content %}
<form method="post">
  <input type="hidden" name="csrf" value="{{ csrf_token }}">
  <div class="card mb-4">
    <div class="card-header d-flex align-items-center justify-content-between">
      <span><i class="bi bi-ticket-perforated text-primary"></i> Système de tickets</span>
      <div class="form-check form-switch mb-0">
        <input class="form-check-input" type="checkbox" name="tickets_enabled" id="tickets_enabled"
               {{ 'checked' if cfg.tickets_enabled }}>
        <label class="form-check-label" for="tickets_enabled">Activé</label>
      </div>
    </div>
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Catégorie où créer les tickets</label>
        <select name="ticket_category_id" class="form-select">
          <option value="">— Aucune (créés à la racine) —</option>
          {% for c in categories %}
            <option value="{{ c.id }}" {{ 'selected' if cfg.ticket_category_id == c.id|int }}>{{ c.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Rôle du staff (qui voit les tickets)</label>
        <select name="ticket_support_role_id" class="form-select">
          <option value="">— Aucun —</option>
          {% for r in roles %}
            <option value="{{ r.id }}" {{ 'selected' if cfg.ticket_support_role_id == r.id|int }}>{{ r.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Message d'accueil dans le ticket</label>
        <textarea name="ticket_open_message" class="form-control" rows="2">{{ cfg.ticket_open_message }}</textarea>
      </div>
      <div class="alert alert-secondary mb-0">
        <i class="bi bi-info-circle"></i> Pour afficher le bouton d'ouverture, utilise
        <code>/ticket panneau</code> dans le salon voulu.
      </div>
    </div>
  </div>
  <button type="submit" class="btn btn-primary btn-lg"><i class="bi bi-check-lg"></i> Enregistrer</button>
</form>
{% endblock %}
